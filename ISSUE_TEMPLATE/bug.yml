name: Public tooling bug
description: Report a reproducible defect in a public CodeVelo repository.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not use this form for security reports or private CodeVelo services.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v1.2.3 or commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant operating system, runtime, and dependency versions.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Public-information check
      options:
        - label: This report contains no credentials, client data, or private infrastructure details.
          required: true

